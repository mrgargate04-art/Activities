<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> the javascript string method</h2>
    <p> the string() method can convert a number to a string</p>
    <p id="number_result"></p>
    <p id="string_result"></p>
    <script>
        var x= 79;
        var y= 90;
        document.getElementById("number_result").innerHTML = x + y;
        document.getElementById("string-result").innerHTML = String(x) + String(y);
    </script>
</body>
</html>
